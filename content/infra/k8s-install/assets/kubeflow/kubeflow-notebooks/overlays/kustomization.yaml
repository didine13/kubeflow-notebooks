apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base
  - istio

patches:
  - path: dex/dex-passwords.yaml
  - path: dex/dex-configmap.yaml
  - path: kubeflow/centraldashboard-config.yaml
  - target:
      kind: Deployment
      name: dex
      namespace: auth
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom
        value:
          - secretRef:
              name: dex-oidc-client
